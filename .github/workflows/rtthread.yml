name: rtthread

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  compile-littlefs:
    name: RT-Thread ${{ matrix.rtthread_ref }} compile
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rtthread_ref: master
            bsp: bsp/qemu-vexpress-a9
            experimental: false
          - rtthread_ref: v5.0.1
            bsp: bsp/qemu-vexpress-a9
            experimental: false

    env:
      RTTHREAD_REF: ${{ matrix.rtthread_ref }}
      RTTHREAD_BSP: ${{ matrix.bsp }}
      RTTHREAD_ELF: rtthread.elf
      RTT_CC: gcc

    steps:
      - name: Checkout littlefs package
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            git \
            make \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib \
            scons \
            python3 \
            python3-pip
          python3 -m pip install --user kconfiglib
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          arm-none-eabi-gcc --version
          scons --version
          python3 --version

      - name: Compile littlefs against RT-Thread
        run: |
          mkdir -p _ci/logs
          sh .github/ci/rtthread-littlefs/build.sh \
            2>&1 | tee "_ci/logs/rtthread-${{ matrix.rtthread_ref }}.log"

      - name: Upload RT-Thread compile log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rtthread-${{ matrix.rtthread_ref }}-compile-log
          path: _ci/logs
          if-no-files-found: warn
